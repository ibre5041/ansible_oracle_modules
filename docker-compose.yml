services:
  oracle:
    image: container-registry.oracle.com/database/enterprise:latest
    environment:
      ORACLE_PWD: Oracle_4U
      ORACLE_SID: ORCLCDB
      ORACLE_PDB: ORCLPDB1
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "/opt/oracle/checkDBStatus.sh"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 300s

volumes:
  oracle-data:
