---

- name: "define pdb connection parameters"
  set_fact:
    connection_parameters: &pdb_con_param
      service_name: "{{ oracle_normal_service_name | default(oracle_pdb_service_name) }}"
      username: "{{ oracle_normal_username | default(oracle_pdb_username) }}"
      password: "{{ oracle_normal_password | default(oracle_pdb_password) }}"
      mode: "{{ oracle_normal_mode | default('normal') }}"
      port: "{{ oracle_port }}"
      host: "{{ oracle_hostname }}"
      
- name: "change _disable_directory_link_check (cdb only)"
  oracle_parameter:
    <<: *pdb_con_param
    name: "_disable_directory_link_check"
    value: "TRUE"
    state: "present"
    scope: "spfile"
  register: _
  failed_when: not _.failed or 'sysdba privileges' not in _.msg

- name: "reset open_cursors"
  oracle_parameter:
    <<: *pdb_con_param
    name: "open_cursors"
    state: "reset"
...
