---

- name: "define cdb connection parameters"
  set_fact:
    connection_parameters: &cdb_con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"      
      service_name: "{{ oracle_cdb_service_name | default(oracle_service_name) }}"
      username: "{{ oracle_cdb_username | default(oracle_username) }}"
      password: "{{ oracle_cdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home }}"

- name: drop PDB {{ oracle_pdb_service_name }}
  oracle_pdb:
    <<: *cdb_con_param
    pdb_name: "{{ oracle_pdb_service_name }}"
    state: "absent"

- name: create PDB {{ oracle_pdb_service_name }}
  oracle_pdb:
    <<: *cdb_con_param
    pdb_name: "{{ oracle_pdb_service_name }}"      
    state: opened
