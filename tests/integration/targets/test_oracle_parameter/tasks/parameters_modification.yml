---

- name: "define pdb connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ (running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      session_container: "{{ (not running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home }}"
      
- name: 'PDB Connection parameters - see or use integration_config.yml.template'
  debug:
    var: connection_parameters
    
- name: "define cdb connection parameters"
  set_fact:
    cdb_connection_parameters: &cdb_con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_cdb_service_name | default(oracle_service_name) }}"
      username: "{{ oracle_cdb_username | default(oracle_username) }}"
      password: "{{ oracle_cdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home }}"

- name: 'CDB Connection parameters - see or use integration_config.yml.template'
  debug:
    var: cdb_connection_parameters

- name: Oracle DB facts - pga_aggregate_target
  oracle_sql:
    <<: *con_param
    sql: |
      select * from v$system_parameter where NAME='pga_aggregate_target'
  register: pga_parameter
  when: not running_on_adb
    
- name: pga_parameter
  debug:
    var: pga_parameter.data[0].value
  when: not running_on_adb

- name: "database facts {{ item }}"
  set_fact:
    "{{ item.name }}": "{{ item.value }}"
  loop:
    - { "name": "pga_aggregate_target_value", "value": "{{ (pga_parameter.data[0].value|int)//1024//1024 }}" }
  when: not running_on_adb

- name: 'CDB Connection paramters - see or use integration_config.yml.template'
  debug:
    var: cdb_connection_parameters
      
- name: "change open_cursors"
  oracle_parameter:
    <<: *con_param
    name: "open_cursors"
    value: "351"
    state: "present"
  when: not running_on_adb
  
- name: "change open_cursors +1"
  oracle_parameter:
    <<: *con_param
    name: "open_cursors"
    value: "352"
    state: "present"
    scope: memory
  register: _    
  failed_when: not _.changed
  when: not running_on_adb
  
- name: "change open_cursors +1(no change)"
  oracle_parameter:
    <<: *con_param
    name: "open_cursors"
    value: "352"
    state: "present"
    scope: memory
  register: _    
  failed_when: _.changed
  when: not running_on_adb
  
- name: "change open_cursors +2"
  oracle_parameter:
    <<: *con_param
    name: "open_cursors"
    value: "353"
    state: "present"
    scope: spfile
  register: _    
  failed_when: not _.changed
  when: not running_on_adb
  
- name: "change open_cursors +2 (no change)"
  oracle_parameter:
    <<: *con_param
    name: "open_cursors"
    value: "353"
    state: "present"
    scope: spfile
  register: _    
  failed_when: _.changed
  when: not running_on_adb

- name: "change pga_aggregate_target to {{ (pga_aggregate_target_value|int) - 50 }}M"
  oracle_parameter:
    <<: *con_param
    name: pga_aggregate_target
    value: "{{ (pga_aggregate_target_value|int) - 50 }}M"
    state: "present"
    scope: both
  when: not running_on_adb

- name: "change pga_aggregate_target +1 (change)"
  oracle_parameter:
    <<: *con_param
    name: "pga_aggregate_target"
    value: "{{ (pga_aggregate_target_value|int) - 50 + 1}}M"
    state: "present"
    scope: both
  register: _
  failed_when: not _.changed
  when: not running_on_adb

- name: "change pga_aggregate_target 1+(idempotent)"
  oracle_parameter:
    <<: *con_param
    name: "pga_aggregate_target"
    value: "{{ (pga_aggregate_target_value|int) - 50 + 1}}M"
    state: "present"
    scope: both
  register: _
  failed_when: _.changed
  when: not running_on_adb

- name: "change pga_aggregate_target (change in memory)"
  oracle_parameter:
    <<: *con_param
    name: "pga_aggregate_target"
    value: "{{(pga_aggregate_target_value|int) - 50}}M"
    state: "present"
    scope: memory
  register: _
  failed_when: not _.changed
  when: not running_on_adb

- name: "revert back pga_aggregate_target"
  oracle_parameter:
    <<: *con_param
    name: "pga_aggregate_target"
    value: "{{(pga_aggregate_target_value|int)}}M"
    state: "present"
    scope: both
  register: _
  failed_when: _.failed
  when: not running_on_adb
  
- name: "change blank_trimming"
  oracle_parameter:
    <<: *con_param
    name: "blank_trimming"
    value: "TRUE"
    state: "present"
    scope: "spfile"
  when: not running_on_adb
  
- name: "change nls_language"
  oracle_parameter:
    <<: *con_param
    name: "nls_language"
    value: "GERMAN"
    state: "present"
    scope: "spfile"
  when: not running_on_adb
   
- name: "change db_recovery_file_dest (cdb only)"
  oracle_parameter:
    <<: *cdb_con_param
    name: "db_recovery_file_dest"
    value: "+FRA"
    state: "present"
    scope: "spfile"
  when: running_on_cdb
  
- name: "change _disable_directory_link_check (cdb only)"
  oracle_parameter:
    <<: *cdb_con_param
    name: "_disable_directory_link_check"
    value: "TRUE"
    state: "present"
    scope: "spfile"
  when: running_on_cdb
    
...
