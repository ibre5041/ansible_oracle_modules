---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ (running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      session_container: "{{ (not running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home }}"

- name: 'Connection parameters - see or use integration_config.yml.template'
  debug:
    var: connection_parameters

- name: remove inexistent privilege from user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges: "create session"
    state: "absent"
  register: _
  failed_when: _.failed or _.changed

- name: add a privilege to user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges: "create session"
    state: "present"

- name: remove this privilege from user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges: "create session"
    state: "absent"
  register: _
  failed_when: _.failed or not _.changed

- name: add privileges to user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges:
      - "create session"
      - "create table"
      - "create synonym"
      - "create view"
    state: "present"

- name: remove this privilege from user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges:
      - "create table"
      - "create synonym"
      - "create materialized view"
    state: "absent"
  register: _
  failed_when: |
    _.failed or (
    not _.changed and
    'create session' in _.ddls and
    'create view' in _.ddls and
    'create materialized view' in _.ddls and
    'create table' not in _.ddls and
    'create synonym' not in _.ddls)

- name: reset user's privilege
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    grant_mode: "exact"    
...
