---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ (running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      session_container: "{{ (not running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home }}"

- name: 'Connection parameters - see or use integration_config.yml.template'
  debug:
    var: connection_parameters

- name: create u_foo user
  oracle_user:
    <<: *con_param
    schema_name: "u_foo"
    schema_password: "bar"

- name: create r_foo role
  oracle_role:
    <<: *con_param
    role: "r_foo"

- name: grant create session to inexistent user
  oracle_grant:
    <<: *con_param
    grantee: "bar"
    privileges: "create session"
    state: "present"
  register: _
  failed_when: not _.failed or _.code != 1917

- name: grant create session to existent user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges: "create session"
    state: "present"
  register: _
  failed_when: _.failed or not _.changed

- name: grant existing privilege to user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges: "create session"
    state: "present"
  register: _
  failed_when: _.failed or _.changed

- name: grant new privilege to user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges: "create table"
    state: "present"
  register: _
  failed_when: _.failed or (not _.changed and 'create table' not in _.ddls)

- name: grant existing privileges to user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges:
      - "create table"
      - "create session"
    state: "present"
  register: _
  failed_when: _.failed or _.changed

- name: grant new privileges to user
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges:
      - "create synonym"
      - "create table"
      - "create view"
    state: "present"
  register: _
  failed_when: _.failed or (not _.changed and 'create table' in _.ddls and 'create synonym' not in _.ddls and 'create view' not in _.ddls)

- name: reset user's privilege
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    grant_mode: "exact"
...
