---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ (running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      session_container: "{{ (not running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home }}"

- name: 'Connection parameters - see or use integration_config.yml.template'
  debug:
    var: connection_parameters

- name: grant create session in check mode
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges: "create session"
  check_mode: yes
  register: _
  failed_when: _.failed or not _.changed

- name: grant again create session in check mode (must change again)
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
    privileges: "create session"
  check_mode: yes
  register: _
  failed_when: _.failed or not _.changed

- name: Remove grants (nothing to do, as nothing was added)
  oracle_grant:
    <<: *con_param
    grantee: "u_foo"
  check_mode: yes
  register: _
  failed_when: _.failed or _.changed

...
