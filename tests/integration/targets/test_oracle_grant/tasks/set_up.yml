---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn | default() }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# oracle_facts fails in ansible-test isolation ("oracledb module is required")
# even when oracledb is installed, due to import path differences between
# ansible-test's virtualenv and the system pip environment.
# Use oracle_sql to fetch the same three parameters directly.
- name: "query DB name, unique name and service name via SQL"
  oracle_sql:
    hostname: "{{ oracle_hostname }}"
    port: "{{ oracle_port }}"
    service_name: "{{ oracle_service_name }}"
    username: "{{ oracle_username }}"
    password: "{{ oracle_password }}"
    mode: sysdba
    oracle_home: "{{ oracle_home | default() }}"
    sql: >
      SELECT
        (SELECT value FROM v$parameter WHERE name = 'db_name')        AS db_name,
        (SELECT value FROM v$parameter WHERE name = 'db_unique_name') AS db_unique_name,
        (SELECT value FROM v$parameter WHERE name = 'service_names')  AS service_names
      FROM dual
  register: db_params

- name: "set DB name facts"
  set_fact:
    db_name:        "{{ (db_params.data | first)['db_name'] }}"
    db_unique_name: "{{ (db_params.data | first)['db_unique_name'] }}"
    service_name:   "{{ (db_params.data | first)['service_names'] | split('.') | first }}"

- name: 'Connection paramters - see or use integration_config.yml.template'
  debug:
    msg: "connection_parameters - db_name: {{ db_name }}, db_unique_name: {{ db_unique_name }}, service_name: {{ service_name }}"

- name: database facts
  set_fact:
    cdb_name: "{{ service_name | split('.') | first }}"
    domain_name: ""
    oracle_cdb_hostname: "{{ lookup('pipe', 'hostname -s') }}"
    pdb_name: "PDB37"

- name: drop PDB
  oracle_pdb:
    <<: *con_param
    pdb_name: "{{ pdb_name }}"
    state: "absent"

- name: create PDB
  oracle_pdb:
    <<: *con_param
    pdb_name: "{{ pdb_name }}"
    pdb_admin_username: pdbadmin
    pdb_admin_password: pdbpass
    state: "opened"
    roles: dba
  register: _
# failed_when: _.failed or not _.changed

- name: grant sysdba to pdbadmin
  oracle_grant:
    <<: *con_param
    grantee: pdbadmin
    privileges:
      - "create session"
      - "sysdba"
    grant_mode: "append"
    container: "{{ pdb_name }}"
    state: present

- name: create u_foo user
  oracle_user:
    <<: *con_param
    hostname: "{{ oracle_cdb_hostname }}"
    port: "{{ oracle_port }}"
    service_name: "{{ pdb_name }}{{ '.' ~ domain_name if domain_name }}"
    username: pdbadmin
    password: pdbpass
    schema_name: "u_foo"
    schema_password: "bar"

- name: create r_foo role
  oracle_role:
    <<: *con_param
    hostname: "{{ oracle_cdb_hostname }}"
    port: "{{ oracle_port }}"
    service_name: "{{ pdb_name }}{{ '.' ~ domain_name if domain_name }}"
    username: pdbadmin
    password: pdbpass
    mode: sysdba
    role: "r_foo"

...
