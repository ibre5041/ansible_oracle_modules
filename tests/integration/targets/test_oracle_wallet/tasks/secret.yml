---
- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_service_name }}"
      username: "{{ oracle_username }}"
      password: "{{ oracle_password }}"
      dsn: "{{ oracle_dsn }}"
      oracle_home: "{{ oracle_home }}"
      mode: "{{ mode }}"

- name: "add secret to keystore"
  oracle_wallet:
    <<: *con_param
    secret: "{{ secret_value }}"
    secret_client: "{{ secret_client }}"
    secret_state: present
    keystore_password: "{{ keystore_password }}"
  register: _
  failed_when: not _.changed

- name: "update existing secret"
  oracle_wallet:
    <<: *con_param
    secret: "updated_secret_value"
    secret_client: "{{ secret_client }}"
    secret_state: present
    keystore_password: "{{ keystore_password }}"
  register: _
  failed_when: not _.changed

- name: "remove secret from keystore"
  oracle_wallet:
    <<: *con_param
    secret_client: "{{ secret_client }}"
    secret_state: absent
    keystore_password: "{{ keystore_password }}"
  register: _
  failed_when: not _.changed

- name: "remove secret (idempotent)"
  oracle_wallet:
    <<: *con_param
    secret_client: "{{ secret_client }}"
    secret_state: absent
    keystore_password: "{{ keystore_password }}"
  register: _
  failed_when: _.changed

...
