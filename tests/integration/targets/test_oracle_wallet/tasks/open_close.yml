---
- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_service_name }}"
      username: "{{ oracle_username }}"
      password: "{{ oracle_password }}"
      dsn: "{{ oracle_dsn }}"
      oracle_home: "{{ oracle_home }}"
      mode: "{{ mode }}"

- name: "open keystore"
  oracle_wallet:
    <<: *con_param
    state: present
    keystore_password: "{{ keystore_password }}"
    open: true
  register: _
  failed_when: _.failed

- name: "verify keystore is open"
  oracle_wallet:
    <<: *con_param
    state: status
  register: wallet_status
  failed_when: wallet_status.wallet_status not in ['OPEN', 'OPEN_NO_MASTER_KEY']

- name: "open keystore (idempotent)"
  oracle_wallet:
    <<: *con_param
    state: present
    keystore_password: "{{ keystore_password }}"
    open: true
  register: _
  failed_when: _.changed

- name: "close keystore"
  oracle_wallet:
    <<: *con_param
    state: present
    keystore_password: "{{ keystore_password }}"
    open: false
  register: _
  failed_when: _.failed

- name: "close keystore (idempotent)"
  oracle_wallet:
    <<: *con_param
    state: present
    keystore_password: "{{ keystore_password }}"
    open: false
  register: _
  failed_when: _.changed

- name: "reopen keystore for subsequent tests"
  oracle_wallet:
    <<: *con_param
    state: present
    keystore_password: "{{ keystore_password }}"
    open: true
  register: _
  failed_when: _.failed

...
