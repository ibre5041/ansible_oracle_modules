---

# oracle_jobschedule uses old-style 'user' parameter (not 'username')
- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      user: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop schedule if exists"
  oracle_jobschedule:
    <<: *con_param
    name: TEST_SCHEDULE
    repeat_interval: "FREQ=DAILY"
    state: absent
  failed_when: false

# ── Create ────────────────────────────────────────────────────────────────────

- name: "create schedule"
  oracle_jobschedule:
    <<: *con_param
    name: TEST_SCHEDULE
    repeat_interval: "FREQ=DAILY;BYHOUR=2;BYMINUTE=0"
    comments: "Integration test schedule"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: schedule already present"
  oracle_jobschedule:
    <<: *con_param
    name: TEST_SCHEDULE
    repeat_interval: "FREQ=DAILY;BYHOUR=2;BYMINUTE=0"
    comments: "Integration test schedule"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Delete ────────────────────────────────────────────────────────────────────

- name: "drop schedule"
  oracle_jobschedule:
    <<: *con_param
    name: TEST_SCHEDULE
    repeat_interval: "FREQ=DAILY;BYHOUR=2;BYMINUTE=0"
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent schedule"
  oracle_jobschedule:
    <<: *con_param
    name: TEST_SCHEDULE
    repeat_interval: "FREQ=DAILY;BYHOUR=2;BYMINUTE=0"
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

...
