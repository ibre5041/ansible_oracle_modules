---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ (running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      session_container: "{{ (not running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home }}"

- debug: var=connection_parameters

- name: "teardown: drop user {{ user }} if exists"
  oracle_user:
    <<: *con_param
    schema_name: "{{ user }}"
    state: absent
  failed_when: false

- name: "teardown: drop tablespaces if exist"
  oracle_tablespace:
    <<: *con_param
    tablespace: "{{ item }}"
    state: absent
  loop:
    - "{{ ts_1 }}"
    - "{{ ts_2 }}"
    - "{{ ts_3 }}"
  failed_when: false

- name: "create tablespaces"
  oracle_sql:
    <<: *con_param
    script: |
      create tablespace {{ ts_1 }} datafile '/tmp/{{ ts_1 }}.dbf' size 10M autoextend off;
      create tablespace {{ ts_2 }} datafile '/tmp/{{ ts_2 }}.dbf' size 10M autoextend off;
      create tablespace {{ ts_3 }} datafile '/tmp/{{ ts_3 }}.dbf' size 10M autoextend off;
  register: _
  failed_when: _.failed

- name: "create user {{ user }} with no authentication"
  oracle_user:
    <<: *con_param
    schema_name: "{{ user }}"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

...
