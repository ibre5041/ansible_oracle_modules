---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"      
      port: "{{ oracle_port }}"      
      service_name: "{{ oracle_service_name }}"
      username: "{{ oracle_username }}"
      password: "{{ oracle_password }}"
      mode: "sysdba"

- name: 'Connection parameters - see or use integration_config.yml.template'
  debug:
    var: connection_parameters

- name: create a PDB TESTPDB2 from seed {{ oracle_pdb_name }}, XML and clone
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB2"
    state: "present"
    open: true
    pdb_admin_username: "foo"
    pdb_admin_password: "bar"
    clone_from: "{{ oracle_pdb_name }}"
    plug_file: "/tmp/testpdb2.xml"
    file_name_convert: "{{ (running_on_db_asm|bool) | ternary(omit, {pdbseed_path: '/tmp/testpdb2/dbf01'}) }}"
  register: _
  failed_when: not _.failed

- debug: var=_

...
