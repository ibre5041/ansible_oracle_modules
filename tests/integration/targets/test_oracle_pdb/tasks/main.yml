---

- name: Role tasks with env
  block:

    - name: "query ASM datadir from Oracle (db_create_file_dest / db_unique_name)"
      oracle_sql:
        hostname: "{{ oracle_hostname }}"
        port: "{{ oracle_port }}"
        service_name: "{{ oracle_service_name }}"
        username: "{{ oracle_username }}"
        password: "{{ oracle_password }}"
        mode: "sysdba"
        oracle_home: "{{ oracle_home | default(omit) }}"
        sql: >-
          SELECT p.value || '/' || d.db_unique_name AS datadir
          FROM v$parameter p, v$database d
          WHERE p.name = 'db_create_file_dest'
      register: _asm_datadir
      when: running_on_db_asm | default(false) and running_on_cdb | default(false)

    - name: "set oracle_datadir from Oracle (ASM)"
      set_fact:
        oracle_datadir: "{{ _asm_datadir.data[0]['datadir'] }}"
      when: running_on_db_asm | default(false) and running_on_cdb | default(false)

    - name: "compute pdbseed path from oracle_datadir"
      set_fact:
        pdbseed_path: "{{ oracle_datadir + ('/PDBSEED' if running_on_db_asm | default(false) else '/pdbseed') }}"
      when: running_on_cdb and oracle_datadir is defined

    - include_tasks: "create_delete.yml"
      when: running_on_cdb

    - include_tasks: "existence.yml"
      when: running_on_cdb

    - include_tasks: "open_close.yml"
      when: running_on_cdb

    - include_tasks: "clone.yml"
      when: running_on_cdb

    - include_tasks: "unplug_plug.yml"
      when: running_on_cdb

    - include_tasks: "exclusive_options.yml"
      when: running_on_cdb

    #- include_tasks: "check_mode.yml"
    #  when: running_on_cdb

  environment:
    ORACLE_SID: "{{ oracle_sid | default() }}"
    ORACLE_HOME: "{{ oracle_home | default() }}"

...
