---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_service_name }}"
      username: "{{ oracle_username }}"
      password: "{{ oracle_password }}"
      mode: "sysdba"

- name: 'Connection paramters - see or use integration_config.yml.template'
  debug:
    var: connection_parameters

- name: create PDB
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB2"
    state: "opened"
    pdb_admin_username: foo
    pdb_admin_password: bar
    file_name_convert: "{{ {pdbseed_path: oracle_datadir + '/TESTPDB2'} }}"

- name: check an existing PDB is present
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB2"
    state: "status"
  register: _
  failed_when: _.failed or not _.state

- name: drop PDB
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB2"
    state: "absent"

- name: check an inexistent PDB raises error with state=status
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB3"
    state: "status"
  register: _
  failed_when: not _.failed

- name: create PDB with state=present (from seed)
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB3"
    state: "present"
    pdb_admin_username: foo
    pdb_admin_password: bar
    file_name_convert: "{{ {pdbseed_path: oracle_datadir + '/TESTPDB3'} }}"
  register: _
  failed_when: _.failed or not _.changed

- name: state=present on existing PDB is idempotent
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB3"
    state: "present"
    pdb_admin_username: foo
    pdb_admin_password: bar
  register: _
  failed_when: _.failed or _.changed

- name: drop TESTPDB3
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB3"
    state: "absent"
...
