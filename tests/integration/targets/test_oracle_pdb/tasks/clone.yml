---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"      
      port: "{{ oracle_port }}"      
      service_name: "{{ oracle_service_name }}"
      username: "{{ oracle_username }}"
      password: "{{ oracle_password }}"
      mode: "sysdba"

- name: 'Connection paramters - see or use integration_config.yml.template'
  debug:
    var: connection_parameters

- name: create an opened PDB
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB2"
    state: "opened"
    pdb_admin_username: foo
    pdb_admin_password: bar
    file_name_convert:
      "{{ oracle_pdbseed_path }}": "{{ oracle_datadir }}/TESTPDB2"

- name: open PDB source in read only
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB2"
    state: "read_only"

- name: create a clone PDB
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTSNAP1"
    state: "opened"
    clone_from: "TESTPDB2"
    file_name_convert:
      "{{ oracle_datadir }}/TESTPDB2": "{{ oracle_datadir }}/TESTSNAP1"

- name: drop clone PDB
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTSNAP1"
    state: "absent"

- name: drop source PDB
  oracle_pdb:
    <<: *con_param
    pdb_name: "TESTPDB2"
    state: "absent"
...
