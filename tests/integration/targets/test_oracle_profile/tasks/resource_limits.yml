---
# Tests for resource limit attributes (non-password limits):
# SESSIONS_PER_USER, IDLE_TIME, CONNECT_TIME, FAILED_LOGIN_ATTEMPTS,
# PASSWORD_LOCK_TIME, PASSWORD_REUSE_MAX, PASSWORD_REUSE_TIME.

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      oracle_home: "{{ oracle_home }}"
      mode: "{{ mode }}"

- name: "setup: drop resource_limits profile if exists"
  oracle_profile:
    <<: *con_param
    profile: TEST_RESOURCE_PROFILE
    state: absent
  failed_when: false

# ── Create profile with mixed password + resource limits ──────────────────────

- name: "create profile with password + resource limits"
  oracle_profile:
    <<: *con_param
    profile: TEST_RESOURCE_PROFILE
    attributes:
      FAILED_LOGIN_ATTEMPTS: "5"
      PASSWORD_LOCK_TIME: "1"
      PASSWORD_LIFE_TIME: "180"
      PASSWORD_REUSE_MAX: "10"
      PASSWORD_REUSE_TIME: "365"
      SESSIONS_PER_USER: "5"
      IDLE_TIME: "30"
      CONNECT_TIME: "480"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: same profile, no change"
  oracle_profile:
    <<: *con_param
    profile: TEST_RESOURCE_PROFILE
    attributes:
      FAILED_LOGIN_ATTEMPTS: "5"
      PASSWORD_LOCK_TIME: "1"
      PASSWORD_LIFE_TIME: "180"
      PASSWORD_REUSE_MAX: "10"
      PASSWORD_REUSE_TIME: "365"
      SESSIONS_PER_USER: "5"
      IDLE_TIME: "30"
      CONNECT_TIME: "480"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Modify a single limit ─────────────────────────────────────────────────────

- name: "change FAILED_LOGIN_ATTEMPTS to 3"
  oracle_profile:
    <<: *con_param
    profile: TEST_RESOURCE_PROFILE
    attributes:
      FAILED_LOGIN_ATTEMPTS: "3"
      PASSWORD_LOCK_TIME: "1"
      PASSWORD_LIFE_TIME: "180"
      PASSWORD_REUSE_MAX: "10"
      PASSWORD_REUSE_TIME: "365"
      SESSIONS_PER_USER: "5"
      IDLE_TIME: "30"
      CONNECT_TIME: "480"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "verify FAILED_LOGIN_ATTEMPTS in returned profile"
  assert:
    that:
      - _.profile.FAILED_LOGIN_ATTEMPTS == "3"

# ── UNLIMITED values ──────────────────────────────────────────────────────────

- name: "set resource limits to UNLIMITED"
  oracle_profile:
    <<: *con_param
    profile: TEST_RESOURCE_PROFILE
    attributes:
      FAILED_LOGIN_ATTEMPTS: "UNLIMITED"
      PASSWORD_LOCK_TIME: "UNLIMITED"
      PASSWORD_LIFE_TIME: "UNLIMITED"
      PASSWORD_REUSE_MAX: "UNLIMITED"
      PASSWORD_REUSE_TIME: "UNLIMITED"
      SESSIONS_PER_USER: "UNLIMITED"
      IDLE_TIME: "UNLIMITED"
      CONNECT_TIME: "UNLIMITED"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: all UNLIMITED, no change"
  oracle_profile:
    <<: *con_param
    profile: TEST_RESOURCE_PROFILE
    attributes:
      FAILED_LOGIN_ATTEMPTS: "UNLIMITED"
      PASSWORD_LOCK_TIME: "UNLIMITED"
      PASSWORD_LIFE_TIME: "UNLIMITED"
      PASSWORD_REUSE_MAX: "UNLIMITED"
      PASSWORD_REUSE_TIME: "UNLIMITED"
      SESSIONS_PER_USER: "UNLIMITED"
      IDLE_TIME: "UNLIMITED"
      CONNECT_TIME: "UNLIMITED"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Cleanup ───────────────────────────────────────────────────────────────────

- name: "drop resource_limits profile"
  oracle_profile:
    <<: *con_param
    profile: TEST_RESOURCE_PROFILE
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

...
