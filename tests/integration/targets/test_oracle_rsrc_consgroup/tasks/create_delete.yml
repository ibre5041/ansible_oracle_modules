---
# oracle_rsrc_consgroup uses old-style 'user' parameter (not 'username').

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      user: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop consumer group if exists"
  oracle_rsrc_consgroup:
    <<: *con_param
    name: TEST_CONS_GROUP
    state: absent
  failed_when: false

# ── Create ────────────────────────────────────────────────────────────────────

- name: "create consumer group"
  oracle_rsrc_consgroup:
    <<: *con_param
    name: TEST_CONS_GROUP
    comments: "Integration test consumer group"
    mgmt_mth: round-robin
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: consumer group already present"
  oracle_rsrc_consgroup:
    <<: *con_param
    name: TEST_CONS_GROUP
    comments: "Integration test consumer group"
    mgmt_mth: round-robin
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Second group ──────────────────────────────────────────────────────────────

- name: "create second consumer group"
  oracle_rsrc_consgroup:
    <<: *con_param
    name: TEST_CONS_GROUP_2
    comments: "Integration test consumer group 2"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

# ── Delete ────────────────────────────────────────────────────────────────────

- name: "drop first consumer group"
  oracle_rsrc_consgroup:
    <<: *con_param
    name: TEST_CONS_GROUP
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent consumer group"
  oracle_rsrc_consgroup:
    <<: *con_param
    name: TEST_CONS_GROUP
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

- name: "drop second consumer group"
  oracle_rsrc_consgroup:
    <<: *con_param
    name: TEST_CONS_GROUP_2
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

...
