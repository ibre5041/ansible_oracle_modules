---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ (running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      session_container: "{{ (not running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"      
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn | default() }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"      

- name: List tablespaces
  oracle_sql:
    <<: *con_param
    sql: "select TABLESPACE_NAME, STATUS, CONTENTS from dba_tablespaces where status='ONLINE' and CONTENTS='PERMANENT' and TABLESPACE_NAME not in('SYSTEM','SYSAUX')"
  register: tablespaces

- name: "Tablespace: {{ tablespaces.data[0].tablespace_name }}"
  set_fact:
    users_tablespace: "{{ tablespaces.data[0].tablespace_name }}"
      
- name: "user creation with password"
  oracle_user:
    <<: *con_param
    schema_name: "foo"
    schema_password: "{{ oracle_schema_password }}"
    state: "present"
  register: _
  failed_when: _.failed or 'identified by' not in _.ddls[0]

- name: "reset user"
  oracle_user:
    <<: *con_param
    schema_name: "foo"
    state: "absent"

