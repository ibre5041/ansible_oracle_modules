---

# Restore points are CDB-level objects: connect to CDB (oracle_service_name, not PDB)
- name: "define connection parameters (CDB)"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_service_name }}"
      username: "{{ oracle_username }}"
      password: "{{ oracle_password }}"
      dsn: "{{ oracle_dsn | default() }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop normal restore point if exists"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_NORMAL
    state: absent
  failed_when: false

- name: "cleanup: drop preserved restore point if exists"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_PRESERVED
    state: absent
  failed_when: false

# ── Normal restore point ──────────────────────────────────────────────────────

- name: "check mode: would create normal restore point?"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_NORMAL
    state: present
  check_mode: true
  register: _
  failed_when: _.failed or _.changed == false

- name: "create normal restore point"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_NORMAL
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: restore point already present"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_NORMAL
    state: present
  register: _
  failed_when: _.failed or _.changed == true

- name: "status: query restore point"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_NORMAL
    state: status
  register: rp_status
  failed_when: rp_status.failed

- name: "check mode: would drop restore point?"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_NORMAL
    state: absent
  check_mode: true
  register: _
  failed_when: _.failed or _.changed == false

- name: "drop normal restore point"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_NORMAL
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent restore point"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_NORMAL
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

# ── Preserved restore point ───────────────────────────────────────────────────

- name: "create preserved restore point"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_PRESERVED
    preserve: true
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: preserved restore point already present"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_PRESERVED
    preserve: true
    state: present
  register: _
  failed_when: _.failed or _.changed == true

- name: "drop preserved restore point"
  oracle_flashback:
    <<: *con_param
    restore_point: TEST_RP_PRESERVED
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

...
