---

# oracle_jobclass uses old-style 'user' parameter (not 'username')
- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      user: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop job class if exists"
  oracle_jobclass:
    <<: *con_param
    name: TEST_JOB_CLASS
    state: absent
  failed_when: false

# ── Create ────────────────────────────────────────────────────────────────────

- name: "create job class"
  oracle_jobclass:
    <<: *con_param
    name: TEST_JOB_CLASS
    logging: "failed runs"
    comments: "Integration test job class"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: job class already present"
  oracle_jobclass:
    <<: *con_param
    name: TEST_JOB_CLASS
    logging: "failed runs"
    comments: "Integration test job class"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Delete ────────────────────────────────────────────────────────────────────

- name: "drop job class"
  oracle_jobclass:
    <<: *con_param
    name: TEST_JOB_CLASS
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent job class"
  oracle_jobclass:
    <<: *con_param
    name: TEST_JOB_CLASS
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

...
