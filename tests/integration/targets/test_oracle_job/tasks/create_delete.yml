---

# oracle_job uses old-style 'user' parameter (not 'username')
- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      user: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop job if exists"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB
    state: absent
  failed_when: false

# ── Create ────────────────────────────────────────────────────────────────────

- name: "create PL/SQL block job (disabled)"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB
    job_type: plsql_block
    job_action: "BEGIN NULL; END;"
    enabled: false
    auto_drop: false
    comments: "Integration test job"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: job already present"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB
    job_type: plsql_block
    job_action: "BEGIN NULL; END;"
    enabled: false
    auto_drop: false
    comments: "Integration test job"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Enable ────────────────────────────────────────────────────────────────────

- name: "enable job"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB
    job_type: plsql_block
    job_action: "BEGIN NULL; END;"
    enabled: true
    auto_drop: false
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: job already enabled"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB
    job_type: plsql_block
    job_action: "BEGIN NULL; END;"
    enabled: true
    auto_drop: false
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Create with repeat_interval ───────────────────────────────────────────────

- name: "cleanup: drop scheduled job if exists"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB_SCHEDULED
    state: absent
  failed_when: false

- name: "create job with repeat_interval"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB_SCHEDULED
    job_type: plsql_block
    job_action: "BEGIN NULL; END;"
    repeat_interval: "FREQ=HOURLY"
    enabled: false
    auto_drop: false
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "drop scheduled job"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB_SCHEDULED
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

# ── Delete ────────────────────────────────────────────────────────────────────

- name: "drop job"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent job"
  oracle_job:
    <<: *con_param
    job_name: SYS.TEST_JOB
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

...
