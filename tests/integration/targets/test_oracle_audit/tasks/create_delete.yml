---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn | default() }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop action audit policy if exists"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: absent
  failed_when: false

- name: "cleanup: drop privilege audit policy if exists"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_PRIVS
    state: absent
  failed_when: false

# ── Action-based policy ───────────────────────────────────────────────────────

- name: "check mode: would create action audit policy?"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    audit_actions:
      - "CREATE TABLE"
      - "DROP TABLE"
    state: present
  check_mode: true
  register: _
  failed_when: _.failed or _.changed == false

- name: "create action audit policy"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    audit_actions:
      - "CREATE TABLE"
      - "DROP TABLE"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: action policy already present"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    audit_actions:
      - "CREATE TABLE"
      - "DROP TABLE"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

- name: "status: query action policy"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: status
  register: audit_status
  failed_when: audit_status.failed

# ── Enable / disable policy ───────────────────────────────────────────────────

- name: "enable action policy for all users"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: enabled
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: policy already enabled"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: enabled
  register: _
  failed_when: _.failed or _.changed == true

- name: "disable action policy"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: disabled
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: policy already disabled"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: disabled
  register: _
  failed_when: _.failed or _.changed == true

# ── Privilege-based policy ────────────────────────────────────────────────────

- name: "create privilege audit policy"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_PRIVS
    audit_privileges:
      - "CREATE USER"
      - "DROP USER"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: privilege policy already present"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_PRIVS
    audit_privileges:
      - "CREATE USER"
      - "DROP USER"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Cleanup ───────────────────────────────────────────────────────────────────

- name: "check mode: would drop action policy?"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: absent
  check_mode: true
  register: _
  failed_when: _.failed or _.changed == false

- name: "drop action audit policy"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent action policy"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_ACTIONS
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

- name: "drop privilege audit policy"
  oracle_audit:
    <<: *con_param
    policy_name: TEST_AUDIT_PRIVS
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

...
