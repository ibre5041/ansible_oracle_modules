---

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn | default() }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop private dblink if exists"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PRIVATE
    link_type: private
    state: absent
  register: _
  failed_when: _.failed

- name: "cleanup: drop public dblink if exists"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PUBLIC
    link_type: public
    state: absent
  register: _
  failed_when: _.failed

# ── Private fixed-user dblink ─────────────────────────────────────────────────

- name: "check mode: would create private dblink?"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PRIVATE
    link_type: private
    connect_user: "{{ oracle_pdb_username | default(oracle_username) }}"
    connect_password: "{{ oracle_pdb_password | default(oracle_password) }}"
    connect_using: "//{{ oracle_hostname }}:{{ oracle_port }}/{{ oracle_pdb_service_name | default(oracle_service_name) }}"
    state: present
  check_mode: true
  register: _
  failed_when: _.failed or _.changed == false

- name: "create private fixed-user dblink"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PRIVATE
    link_type: private
    connect_user: "{{ oracle_pdb_username | default(oracle_username) }}"
    connect_password: "{{ oracle_pdb_password | default(oracle_password) }}"
    connect_using: "//{{ oracle_hostname }}:{{ oracle_port }}/{{ oracle_pdb_service_name | default(oracle_service_name) }}"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: private dblink already present"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PRIVATE
    link_type: private
    connect_user: "{{ oracle_pdb_username | default(oracle_username) }}"
    connect_password: "{{ oracle_pdb_password | default(oracle_password) }}"
    connect_using: "//{{ oracle_hostname }}:{{ oracle_port }}/{{ oracle_pdb_service_name | default(oracle_service_name) }}"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

- name: "status: query private dblink"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PRIVATE
    link_type: private
    state: status
  register: dblink_status
  failed_when: dblink_status.failed

- name: "check mode: would drop private dblink?"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PRIVATE
    link_type: private
    state: absent
  check_mode: true
  register: _
  failed_when: _.failed or _.changed == false

- name: "drop private dblink"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PRIVATE
    link_type: private
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent private dblink"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PRIVATE
    link_type: private
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

# ── Public fixed-user dblink ──────────────────────────────────────────────────

- name: "create public fixed-user dblink"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PUBLIC
    link_type: public
    connect_user: "{{ oracle_pdb_username | default(oracle_username) }}"
    connect_password: "{{ oracle_pdb_password | default(oracle_password) }}"
    connect_using: "//{{ oracle_hostname }}:{{ oracle_port }}/{{ oracle_pdb_service_name | default(oracle_service_name) }}"
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: public dblink already present"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PUBLIC
    link_type: public
    connect_user: "{{ oracle_pdb_username | default(oracle_username) }}"
    connect_password: "{{ oracle_pdb_password | default(oracle_password) }}"
    connect_using: "//{{ oracle_hostname }}:{{ oracle_port }}/{{ oracle_pdb_service_name | default(oracle_service_name) }}"
    state: present
  register: _
  failed_when: _.failed or _.changed == true

- name: "drop public dblink"
  oracle_dblink:
    <<: *con_param
    link_name: TEST_DBLINK_PUBLIC
    link_type: public
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

...
