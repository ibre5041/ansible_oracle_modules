---
# Exercises the CDB root connection path (oracle_service_name, not oracle_pdb_service_name).
# This task file is only included when running_on_cdb is true.

- name: define CDB-root connection parameters
  set_fact:
    cdb_connection_parameters: &cdb_con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_service_name }}"
      username: "{{ oracle_username }}"
      password: "{{ oracle_password }}"
      dsn: "{{ oracle_dsn }}"
      oracle_home: "{{ oracle_home }}"
      mode: "{{ mode }}"

- name: select from dual on CDB root
  oracle_sql:
    <<: *cdb_con_param
    sql: "select * from dual"
  register: _
  failed_when: _.changed or _.failed or _.data[0]['dummy'] != 'X'

- name: verify connected to CDB root container
  oracle_sql:
    <<: *cdb_con_param
    sql: "select sys_context('USERENV', 'CON_NAME') as con_name from dual"
  register: _
  failed_when: _.failed

- name: assert connected to CDB$ROOT (not a PDB)
  assert:
    that:
      - _['data'][0]['con_name'] == 'CDB$ROOT'

- name: select from v$pdbs (CDB-root-only view)
  oracle_sql:
    <<: *cdb_con_param
    sql: "select con_id, name from v$pdbs order by con_id"
  register: _
  failed_when: _.changed or _.failed

- name: assert at least one PDB is visible from CDB root
  assert:
    that:
      - _['data'] | length > 0
