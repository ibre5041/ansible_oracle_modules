---

# oracle_jobwindow uses old-style 'user' parameter (not 'username').
# NOTE: The module validates duration_min/duration_hour unconditionally,
# even for state: absent. All tasks must include one duration parameter.
- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      user: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop window if exists"
  oracle_jobwindow:
    <<: *con_param
    name: TEST_WINDOW
    repeat_interval: "FREQ=DAILY;BYHOUR=22;BYMINUTE=0"
    duration_hour: 1
    state: absent
  failed_when: false

# ── Create (enabled) ──────────────────────────────────────────────────────────

- name: "create window (enabled)"
  oracle_jobwindow:
    <<: *con_param
    name: TEST_WINDOW
    repeat_interval: "FREQ=DAILY;BYHOUR=22;BYMINUTE=0"
    duration_hour: 1
    comments: "Integration test window"
    state: enabled
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: window already enabled"
  oracle_jobwindow:
    <<: *con_param
    name: TEST_WINDOW
    repeat_interval: "FREQ=DAILY;BYHOUR=22;BYMINUTE=0"
    duration_hour: 1
    comments: "Integration test window"
    state: enabled
  register: _
  failed_when: _.failed or _.changed == true

# ── Disable ───────────────────────────────────────────────────────────────────

- name: "disable window"
  oracle_jobwindow:
    <<: *con_param
    name: TEST_WINDOW
    repeat_interval: "FREQ=DAILY;BYHOUR=22;BYMINUTE=0"
    duration_hour: 1
    state: disabled
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: window already disabled"
  oracle_jobwindow:
    <<: *con_param
    name: TEST_WINDOW
    repeat_interval: "FREQ=DAILY;BYHOUR=22;BYMINUTE=0"
    duration_hour: 1
    state: disabled
  register: _
  failed_when: _.failed or _.changed == true

# ── Delete ────────────────────────────────────────────────────────────────────

- name: "drop window (absent)"
  oracle_jobwindow:
    <<: *con_param
    name: TEST_WINDOW
    repeat_interval: "FREQ=DAILY;BYHOUR=22;BYMINUTE=0"
    duration_hour: 1
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent window"
  oracle_jobwindow:
    <<: *con_param
    name: TEST_WINDOW
    repeat_interval: "FREQ=DAILY;BYHOUR=22;BYMINUTE=0"
    duration_hour: 1
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

...
