---
# oracle_privs uses old-style 'user' parameter (not 'username')

- name: "define pdb connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ (running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      session_container: "{{ (not running_on_server|bool) | ternary(omit,oracle_pdb_service_name|default(oracle_service_name)) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      dsn: "{{ oracle_dsn }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home }}"

- name: 'PDB Connection parameters - see or use integration_config.yml.template'
  debug:
    var: connection_parameters

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "setup: create test user for privilege tests"
  oracle_user:
    <<: *con_param
    schema_name: "U_PRIVS_TEST"
    state: present
  failed_when: "false"

# ── System privileges ─────────────────────────────────────────────────────────

- name: "grant CREATE TABLE system privilege"
  oracle_privs:
    <<: *con_param
    privs:
      - CREATE TABLE
    roles:
      - U_PRIVS_TEST
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: privilege already granted"
  oracle_privs:
    <<: *con_param
    privs:
      - CREATE TABLE
    roles:
      - U_PRIVS_TEST
    state: present
  register: _
  failed_when: _.failed or _.changed == true

- name: "grant multiple system privileges"
  oracle_privs:
    <<: *con_param
    privs:
      - CREATE VIEW
      - CREATE SEQUENCE
    roles:
      - U_PRIVS_TEST
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: multiple privileges already granted"
  oracle_privs:
    <<: *con_param
    privs:
      - CREATE VIEW
      - CREATE SEQUENCE
    roles:
      - U_PRIVS_TEST
    state: present
  register: _
  failed_when: _.failed or _.changed == true

- name: "revoke CREATE TABLE privilege"
  oracle_privs:
    <<: *con_param
    privs:
      - CREATE TABLE
    roles:
      - U_PRIVS_TEST
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: revoke already-absent privilege"
  oracle_privs:
    <<: *con_param
    privs:
      - CREATE TABLE
    roles:
      - U_PRIVS_TEST
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

# ── Cleanup ───────────────────────────────────────────────────────────────────

- name: "cleanup: revoke remaining privileges"
  oracle_privs:
    <<: *con_param
    privs:
      - CREATE VIEW
      - CREATE SEQUENCE
    roles:
      - U_PRIVS_TEST
    state: absent
  failed_when: "false"

- name: "cleanup: drop test user"
  oracle_user:
    <<: *con_param
    schema_name: "U_PRIVS_TEST"
    state: absent
  failed_when: "false"

...
