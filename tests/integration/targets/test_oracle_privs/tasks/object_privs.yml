---
# oracle_privs uses old-style 'user' parameter (not 'username')

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      user: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

- name: "define new-style connection for setup modules"
  set_fact:
    con_new: &con_new
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "setup: create owner schema"
  oracle_user:
    <<: *con_new
    schema_name: "U_PRIVS_OWNER"
    state: present
  failed_when: false

- name: "setup: create grantee schema"
  oracle_user:
    <<: *con_new
    schema_name: "U_PRIVS_GRANTEE"
    state: present
  failed_when: false

- name: "setup: create table in owner schema"
  oracle_sql:
    <<: *con_new
    sql: "CREATE TABLE U_PRIVS_OWNER.PRIV_TEST_TABLE (id NUMBER)"
  failed_when: false

# ── Object privileges ─────────────────────────────────────────────────────────

- name: "grant SELECT on specific table"
  oracle_privs:
    <<: *con_param
    privs:
      - SELECT
    objs:
      - U_PRIVS_OWNER.PRIV_TEST_TABLE
    objtypes:
      - TABLE
    roles:
      - U_PRIVS_GRANTEE
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: SELECT already granted"
  oracle_privs:
    <<: *con_param
    privs:
      - SELECT
    objs:
      - U_PRIVS_OWNER.PRIV_TEST_TABLE
    objtypes:
      - TABLE
    roles:
      - U_PRIVS_GRANTEE
    state: present
  register: _
  failed_when: _.failed or _.changed == true

- name: "grant INSERT on specific table"
  oracle_privs:
    <<: *con_param
    privs:
      - INSERT
    objs:
      - U_PRIVS_OWNER.PRIV_TEST_TABLE
    objtypes:
      - TABLE
    roles:
      - U_PRIVS_GRANTEE
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "revoke SELECT on specific table"
  oracle_privs:
    <<: *con_param
    privs:
      - SELECT
    objs:
      - U_PRIVS_OWNER.PRIV_TEST_TABLE
    objtypes:
      - TABLE
    roles:
      - U_PRIVS_GRANTEE
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: revoke already-absent SELECT"
  oracle_privs:
    <<: *con_param
    privs:
      - SELECT
    objs:
      - U_PRIVS_OWNER.PRIV_TEST_TABLE
    objtypes:
      - TABLE
    roles:
      - U_PRIVS_GRANTEE
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

# ── Wildcard object privileges ─────────────────────────────────────────────────

- name: "grant SELECT on all tables in owner schema (wildcard)"
  oracle_privs:
    <<: *con_param
    privs:
      - SELECT
    objs:
      - "U_PRIVS_OWNER.%"
    objtypes:
      - TABLE
    roles:
      - U_PRIVS_GRANTEE
    state: present
  register: _
  failed_when: _.failed

# ── Cleanup ───────────────────────────────────────────────────────────────────

- name: "cleanup: drop owner schema"
  oracle_user:
    <<: *con_new
    schema_name: "U_PRIVS_OWNER"
    state: absent
  failed_when: false

- name: "cleanup: drop grantee schema"
  oracle_user:
    <<: *con_new
    schema_name: "U_PRIVS_GRANTEE"
    state: absent
  failed_when: false

...
