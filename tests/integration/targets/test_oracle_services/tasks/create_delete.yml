---
# oracle_services uses 'username' parameter (new-style).
# In non-GI environments (Docker), the module uses DBMS_SERVICE.
# oracle_home and database_name are required parameters.

- name: "define connection parameters"
  set_fact:
    connection_parameters: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_pdb_service_name | default(oracle_service_name) }}"
      username: "{{ oracle_pdb_username | default(oracle_username) }}"
      password: "{{ oracle_pdb_password | default(oracle_password) }}"
      mode: "{{ mode }}"
      oracle_home: "{{ oracle_home | default() }}"
      database_name: "{{ oracle_sid }}"
      pdb: "{{ oracle_pdb_service_name }}"
      gi_managed: false

# ── Setup ─────────────────────────────────────────────────────────────────────

- name: "cleanup: drop test service if exists"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: absent
  failed_when: false

# ── Create ────────────────────────────────────────────────────────────────────

- name: "check_mode: create service (no change)"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: present
  register: _
  check_mode: true
  failed_when: _.failed

- name: "create service"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: present
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: service already present"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: present
  register: _
  failed_when: _.failed or _.changed == true

# ── Start / Stop ──────────────────────────────────────────────────────────────

- name: "start service"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: started
  register: _
  failed_when: _.failed or not _.changed

- name: "status: service should be running"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: status
  register: _
  failed_when: _.failed or "running" not in _.msg or _.changed

- name: "stop service"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: stopped
  register: _
  failed_when: _.failed or not _.changed

# ── Delete ────────────────────────────────────────────────────────────────────

- name: "check_mode: drop service (no change)"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: absent
  register: _
  check_mode: true
  failed_when: _.failed

- name: "drop service"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: absent
  register: _
  failed_when: _.failed or _.changed == false

- name: "idempotence: drop absent service"
  oracle_services:
    <<: *con_param
    name: TEST_SVC
    state: absent
  register: _
  failed_when: _.failed or _.changed == true

...
