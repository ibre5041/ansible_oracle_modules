---
- name: "define connection parameters"
  set_fact:
    con_param: &con_param
      hostname: "{{ oracle_hostname }}"
      port: "{{ oracle_port }}"
      service_name: "{{ oracle_service_name }}"
      username: "{{ oracle_username }}"
      password: "{{ oracle_password }}"
      dsn: "{{ oracle_dsn }}"
      oracle_home: "{{ oracle_home }}"
      mode: "{{ mode }}"
      keystore_location: "{{ oracle_wallet_location }}"

- name: make sure wallet directory exists {{ oracle_wallet_location }}
  file:
    path: "{{ oracle_wallet_location }}"
    state: directory
    #owner: "{{ oracle_os_user }}"
    #group: "{{ oracle_os_group }}"
    #recurse: yes
    mode: '0755'

- name: "create keystore (if not exists)"
  oracle_wallet:
    <<: *con_param
    state: present
    keystore_password: "{{ keystore_password }}"
  register: _
  failed_when: _.failed

- name: "open keystore"
  oracle_wallet:
    <<: *con_param
    state: present
    open: true
    keystore_password: "{{ keystore_password }}"
  register: _
  failed_when: _.failed

...
