---

- name: udev rules {item.src}
  template:
    src: "{{ item.source }}"
    dest: "{{ item.dest }}"
  loop:
    - {source: 55-usm.rules, dest: /etc/udev/rules.d/55-usm.rules}
    - {source: 12-dm-permissions.rules, dest: /etc/udev/rules.d/12-dm-permissions.rules}
    - {source: 10-scsi-asm.rules, dest: /etc/udev/rules.d/10-scsi-asm.rules}
    
- name: install udevasm.sh
  copy:
    src: udevasm.sh
    dest: /etc/udev/udevasm.sh
    mode: '0750'

- name: reload udev
  command: udevadm trigger

- name: Wait for ASM DISK detection
  wait_for:
    # disk LUNs are assigned in order 15,14,...
    path: /dev/asmshared003
    delay: 0
    timeout: 30
    state: present
