
- name: "Execute Config Tools gridSetup.sh (part II)"
  block:
    - name: install {{ oracle_gi_response_file }}
      template:
        src:  "{{ oracle_gi_response_file }}"
        dest: "{{ oracle_install_dir_temp }}"
        mode: '0640'
        owner: "{{ oracle_os_user }}"

    - name: "Config Grid ASM (Part II)"
      shell: "./gridSetup.sh -executeConfigTools -responseFile {{ oracle_install_dir_temp }}/{{ oracle_gi_response_file }} -silent"
      args:
        chdir: "{{ oracle_home }}"
      environment:
        #CV_ASSUME_DISTID: OEL7.8
      register: grid_setup_out2
      # gridSetup.sh returns 1-6 for non-critical warnings (e.g. swap size).
      # Only codes > 6 indicate actual failure (exit codes are undocumented by Oracle).
      failed_when: grid_setup_out2.rc > 6
    - debug: 
        msg: "gridSetup.sh (part II) {{ grid_setup_out2 }}"
      when: grid_setup_out2.rc >= 0
    - debug: 
        msg: "Return code is {{ grid_setup_out2.rc }}"
      when: grid_setup_out2.rc >= 0
      
  become: yes
  become_user: oracle
  # Condition to be set on caller level
  # when: ansible_hostname == first_rac_node and crsbuild_present.stat.exists != True

