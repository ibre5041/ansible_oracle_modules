---
# tasks file for default_vars_only

- name: Detect hypervisor type via DMI (no package required)
  ansible.builtin.shell: cat /sys/class/dmi/id/sys_vendor 2>/dev/null || echo unknown
  register: dmi_sys_vendor
  changed_when: false
  failed_when: false

- name: Detect product name via DMI
  ansible.builtin.shell: cat /sys/class/dmi/id/product_name 2>/dev/null || echo unknown
  register: dmi_product_name
  changed_when: false
  failed_when: false

- name: Set hypervisor facts from DMI
  ansible.builtin.set_fact:
    is_aws_environment: "{{ 'amazon' in (dmi_sys_vendor.stdout | lower) }}"
    is_vmware_environment: "{{ 'vmware' in (dmi_sys_vendor.stdout | lower) }}"
    is_vbox_environment: "{{ 'virtualbox' in (dmi_product_name.stdout | lower) }}"
