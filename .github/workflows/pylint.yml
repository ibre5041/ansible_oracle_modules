name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analysing the code with pylint
      run: |
        # Exclude third-party (antlr3 runtime), ANTLR-generated code, Jinja2 templates,
        # and unit tests (which import antlr3 and cause cyclic-import noise).
        FILES=$(git ls-files '*.py' \
          | grep -v 'plugins/module_utils/antlr3/' \
          | grep -v 'plugins/module_utils/dotora.py' \
          | grep -v 'roles/oracle_post_install/templates/' \
          | grep -v 'tests/unit/')
        pylint --fail-under=7 $FILES
